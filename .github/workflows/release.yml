name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  # 构建并发布二进制文件
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-gnu
            os: windows-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: |
          cargo build --release --package zhan

      - name: Package binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czvf zhan-${{ matrix.target }}.tar.gz -C target/release zhan

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/release/zhan.exe -DestinationPath zhan-${{ matrix.target }}.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.target == 'x86_64-pc-windows-gnu' && 'zhan-*.zip' || 'zhan-*.tar.gz' }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 构建并发布 Homebrew formula (可选)
  homebrew:
    name: Homebrew Tap
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 1BossX/homebrew-tap
          sparse-checkout: |
             Formula/zhan-cli.rb
          sparse-checkout-cone-mode: false
          token: ${{ secrets.HOMEBREW_TOKEN }}

      - name: Update Homebrew formula
        run: |
          # 这里需要根据版本更新 formula
          echo "需要手动更新 Homebrew formula"
