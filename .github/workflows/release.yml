name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # 构建检查
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  # 多平台构建矩阵
  build-matrix:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zhan-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/zhan

  # 打包并发布
  release:
    needs: [check, build-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Package binaries
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          mkdir -p ./packages

          for target in x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            if [ -f "./binaries/zhan-${target}/zhan" ]; then
              chmod +x "./binaries/zhan-${target}/zhan"
              tar -czf "./packages/zhan-${VERSION}-${target}.tar.gz" -C "./binaries/zhan-${target}" zhan
              echo "Packaged: zhan-${VERSION}-${target}.tar.gz"
            fi
          done

      - name: Generate checksums
        run: |
          cd ./packages
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Upload install.sh to release
        run: |
          cp install.sh ./packages/

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./packages/*.tar.gz
            ./packages/checksums.txt
            ./packages/install.sh
          token: ${{ secrets.GITHUB_TOKEN }}
